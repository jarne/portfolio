name: Build and deploy the website
on: [push]
jobs:
    build:
        name: Build Gatsby project
        runs-on: ubuntu-latest
        permissions:
            id-token: write
            contents: read
        steps:
            - name: Checkout
              uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

            - name: Setup Node.js
              uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
              with:
                  node-version: 24
                  cache: yarn

            - name: Install Yarn dependencies
              run: yarn install --immutable

            - name: Gatsby .cache folder cache
              id: cache-gatsby-cache
              uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6
              with:
                  path: .cache
                  key: ${{ runner.os }}-gatsby-cache

            - name: Gatsby public folder cache
              id: cache-gatsby-public
              uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6
              with:
                  path: public
                  key: ${{ runner.os }}-gatsby-public

            - name: Build Gatsby page
              run: yarn build

            - name: Save build output
              uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
              with:
                  name: gatsby-build-out
                  path: public
    deploy:
        name: Deploy static website to S3
        if: github.ref == 'refs/heads/main'
        needs: build
        runs-on: ubuntu-latest
        permissions:
            id-token: write
            contents: read
        steps:
            - name: Checkout
              uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

            - name: Restore build output
              uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
              with:
                  name: gatsby-build-out
                  path: public

            - name: Configure AWS
              uses: aws-actions/configure-aws-credentials@e6de054238d6b7531b4efff3b6587d9aade6a06c # v6
              with:
                  aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
                  aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
                  aws-region: eu-central-1

            - name: Upload to AWS S3
              run: aws s3 sync public s3://portfolio.jarne.rocks --delete
